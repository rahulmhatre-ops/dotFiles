# ── starship.toml ────────────────────────────────────────────────────────────
# Location: ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$character"""

right_format = """
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs\
$rust\
$golang\
$python\
[](fg:teal bg:blue)\
$docker_context\
[](fg:blue bg:mauve)"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "󰀵 "
Linux = "󰌽 "
Windows = "󰍲 "

[username]
show_always = true
style_user  = "bg:surface0 fg:text"
style_root  = "bg:surface0 fg:red"
format      = '[ $user ]($style)'

[directory]
style            = "fg:mantle bg:peach"
format           = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

[git_branch]
format =  '[$symbol$branch(:$remote_branch)]($style)'

# ~/.config/starship.toml

[git_status]
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'

[nodejs]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[python]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[rust]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[golang]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'

[docker_context]
symbol = ""
style  = "bg:blue"
format = '[[ $symbol( $context) ](fg:mantle bg:blue)]($style)'

[time]
disabled      = false
time_format   = "%R"
style         = "bg:mauve"
format        = '[[  $time ](fg:mantle bg:mauve)]($style)'

[line_break]
disabled = false

[character]
disabled         = false
success_symbol   = '[❯](bold fg:green)'
error_symbol     = '[❯](bold fg:red)'
vimcmd_symbol    = '[❮](bold fg:mauve)'
vimcmd_replace_one_symbol = '[❮](bold fg:peach)'
vimcmd_replace_symbol     = '[❮](bold fg:peach)'
vimcmd_visual_symbol      = '[❮](bold fg:yellow)'
